name: Update README with Latest Posts and Stats

on:
  schedule:
    - cron: '0 0 * * 0'  # Every Sunday at midnight UTC
    - cron: '0 12 * * *'  # Every day at noon UTC
  workflow_dispatch:  # Manual trigger button

jobs:
  update-readme:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: |
          pip install feedparser requests beautifulsoup4
      
      - name: Fetch Medium posts and update README
        run: |
          python3 << 'EOF'
          import feedparser
          import re
          from datetime import datetime
          
          # Read current README
          with open('README.md', 'r', encoding='utf-8') as f:
              content = f.read()
          
          try:
              # Fetch Medium RSS feed
              feed_url = 'https://medium.com/feed/@prikshitgautam27'
              feed = feedparser.parse(feed_url)
              
              # Generate blog posts list (top 5)
              if feed.entries:
                  blog_posts = '\n'.join([
                      f"- [{entry.title}]({entry.link})"
                      for entry in feed.entries[:5]
                  ])
              else:
                  blog_posts = '- No Medium posts yet. Check back soon!\n'
          except Exception as e:
              print(f"Error fetching Medium feed: {e}")
              blog_posts = '- Unable to fetch Medium posts at this moment.\n'
          
          # Update README with new blog posts section
          updated_content = re.sub(
              r'<!-- BLOG-POST-LIST:START -->.*?<!-- BLOG-POST-LIST:END -->',
              f'<!-- BLOG-POST-LIST:START -->\n{blog_posts}\n<!-- BLOG-POST-LIST:END -->',
              content,
              flags=re.DOTALL
          )
          
          # Add timestamp
          updated_content = re.sub(
              r'Last updated:.*',
              f'Last updated: {datetime.utcnow().strftime("%Y-%m-%d %H:%M:%S UTC")}',
              updated_content
          )
          
          # Write back to README
          with open('README.md', 'w', encoding='utf-8') as f:
              f.write(updated_content)
          
          print("✅ README updated successfully!")
          
          EOF
      
      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "🤖 GitHub Action Bot"
      
      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "No changes detected"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "Changes detected - will commit"
            echo "has_changes=true" >> $GITHUB_OUTPUT
            git diff README.md
          fi
      
      - name: Commit and push changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git add README.md
          git commit -m "🤖 Auto-update README with latest Medium posts - $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Update status
        if: steps.changes.outputs.has_changes == 'false'
        run: echo "✅ README is already up to date!"
